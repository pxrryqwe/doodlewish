version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
      drizzle:
        patterns:
          - "drizzle-orm"
          - "drizzle-kit"
      eslint:
        patterns:
          - "eslint*"
          - "@types/eslint*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
